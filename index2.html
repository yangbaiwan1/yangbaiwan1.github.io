<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>阳百万 · 暗黑主题名片 | 支持打印 & GitHub</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 屏幕显示样式 (暗黑主题) */
        body {
            background: linear-gradient(145deg, #121212 0%, #1e1e1e 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 140, 0, 0.08) 0%, rgba(18, 18, 18, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 2;
        }

        .business-card {
            max-width: 560px;
            width: 100%;
            background: #2d2d2d;
            background: linear-gradient(135deg, #2d2d2d, #252525);
            border-radius: 48px;
            box-shadow: 0 30px 45px -15px rgba(0, 0, 0, 0.7), 0 4px 12px rgba(0, 0, 0, 0.4), 0 1px 0px rgba(255, 255, 255, 0.05) inset;
            padding: 2rem 2rem 2.2rem;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 140, 60, 0.2);
        }

        .business-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 55px -18px rgba(0, 0, 0, 0.8), 0 1px 0px rgba(255, 160, 80, 0.1) inset;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff9f4a;
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, border-color 0.2s;
            background-color: #3a2a1e;
        }

        .avatar:hover {
            transform: scale(1.02);
            border-color: #ffb86b;
        }

        .greeting {
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 0.8rem;
            margin-bottom: 0.2rem;
            padding: 0.3rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            color: #ffcb9a;
            display: inline-block;
            letter-spacing: 0.5px;
            border: 0.5px solid rgba(255, 180, 100, 0.3);
        }

        .name {
            font-size: 2.2rem;
            font-weight: 700;
            margin-top: 0.6rem;
            margin-bottom: 0.25rem;
            color: #ffffff;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 3px rgba(0, 0, 0, 0.3);
        }

        .role-tagline {
            font-size: 0.95rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(2px);
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: #e0e0e0;
            margin-bottom: 1.2rem;
            letter-spacing: 0.3px;
            border: 0.5px solid rgba(255, 180, 100, 0.3);
        }

        .bio {
            font-size: 1rem;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.9rem 1.2rem;
            border-radius: 28px;
            color: #dddddd;
            margin: 0.8rem 0 1.4rem 0;
            width: 100%;
            font-weight: 450;
            backdrop-filter: blur(2px);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2), 0 1px 0px rgba(255,255,210,0.02);
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin: 0.8rem 0 1.2rem 0;
            width: 100%;
        }

        .skill-tag {
            background: rgba(60, 60, 70, 0.8);
            padding: 0.5rem 1.25rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ffbc7a;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            border: 0.5px solid rgba(255, 140, 50, 0.4);
        }

        .skill-tag:hover {
            background: #ff9f4a;
            color: #1e1e1e;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            border-color: #ffb86b;
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(20, 20, 30, 0.9);
            color: #ffb067;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.85rem 1.8rem;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 140, 50, 0.6);
            cursor: pointer;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
            font-family: inherit;
            margin: 0;
            backdrop-filter: blur(2px);
        }

        .contact-btn:hover {
            background: #ff9f4a;
            color: #121212;
            border-color: #ffce9e;
            transform: scale(1.02);
            box-shadow: 0 12px 22px -8px rgba(0, 0, 0, 0.5);
            gap: 12px;
        }

        .contact-btn:active {
            transform: scale(0.98);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 0.6rem 0 0.2rem 0;
            width: 100%;
        }

        /* 页脚区域：包含版权信息和 GitHub 社交链接 */
        .footer {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            width: 100%;
            z-index: 2;
        }

        .copyright {
            text-align: center;
            font-size: 0.8rem;
            color: #aaaaaa;
            background: rgba(30, 30, 35, 0.7);
            backdrop-filter: blur(6px);
            padding: 0.8rem 1.4rem;
            font-weight: 450;
            letter-spacing: 0.3px;
            border-radius: 60px;
            width: auto;
            max-width: fit-content;
            margin: 0 auto;
            border-top: 1px solid rgba(255, 140, 80, 0.2);
            border-bottom: 1px solid transparent;
        }

        /* GitHub 社交链接样式 */
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: rgba(30, 30, 35, 0.7);
            backdrop-filter: blur(6px);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            text-decoration: none;
            color: #dddddd;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 140, 80, 0.2);
        }

        .social-link i {
            font-size: 1.2rem;
        }

        .social-link:hover {
            background: #ff9f4a;
            color: #121212;
            border-color: #ffce9e;
            transform: translateY(-2px);
        }

        /* 响应式调整 */
        @media (max-width: 580px) {
            .business-card {
                padding: 1.5rem 1.4rem 1.8rem;
                border-radius: 36px;
            }
            .avatar {
                width: 100px;
                height: 100px;
                border-width: 2.5px;
            }
            .greeting {
                font-size: 0.9rem;
                margin-top: 0.5rem;
                padding: 0.2rem 0.9rem;
            }
            .name {
                font-size: 1.8rem;
                margin-top: 0.4rem;
            }
            .role-tagline {
                font-size: 0.8rem;
                padding: 0.3rem 0.9rem;
            }
            .bio {
                font-size: 0.9rem;
                padding: 0.7rem 1rem;
                margin: 0.6rem 0 1rem;
            }
            .skill-tag {
                font-size: 0.75rem;
                padding: 0.4rem 1rem;
            }
            .contact-btn {
                padding: 0.7rem 1.4rem;
                font-size: 0.9rem;
            }
            .button-group {
                gap: 0.8rem;
                margin-top: 0.4rem;
            }
            .footer {
                margin-top: 1.2rem;
                gap: 0.6rem;
            }
            .copyright {
                font-size: 0.7rem;
                padding: 0.6rem 1rem;
            }
            .social-link {
                font-size: 0.8rem;
                padding: 0.5rem 1rem;
            }
        }

        @media (max-width: 400px) {
            .business-card {
                padding: 1.2rem 1.2rem 1.6rem;
            }
            .skills {
                gap: 0.6rem;
            }
            .skill-tag {
                font-size: 0.7rem;
                padding: 0.35rem 0.9rem;
            }
            .contact-btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.85rem;
            }
        }

        @media (max-height: 680px) and (orientation: landscape) {
            body {
                padding: 0.8rem;
            }
            .business-card {
                padding: 1rem 1.8rem;
            }
            .avatar {
                width: 80px;
                height: 80px;
            }
            .greeting {
                font-size: 0.8rem;
                margin-top: 0.2rem;
                padding: 0.1rem 0.7rem;
            }
            .name {
                font-size: 1.6rem;
                margin-top: 0.2rem;
            }
            .bio {
                margin: 0.4rem 0 0.8rem;
            }
            .skills {
                margin: 0.4rem 0 1rem;
            }
            .button-group {
                margin: 0.4rem 0 0rem;
            }
            .footer {
                margin-top: 0.8rem;
            }
        }

        .card-content > * + * {
            margin-top: 0.1rem;
        }

        .business-card {
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.2s;
        }

        /* ========= 打印样式 ========= */
        @media print {
            /* 隐藏页面背景、装饰元素、按钮组、版权信息以及页脚所有内容（包括GitHub链接） */
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            body::before {
                display: none !important;
            }
            .footer,
            .button-group,
            .contact-btn,
            .avatar:hover,
            .business-card:hover {
                display: none !important;
            }
            .card-wrapper {
                display: block !important;
                margin: 0 auto !important;
                padding: 0 !important;
                width: 100% !important;
            }
            .business-card {
                background: white !important;
                box-shadow: none !important;
                border: 1px solid #ccc !important;
                border-radius: 20px !important;
                padding: 1.5rem !important;
                margin: 0 auto !important;
                max-width: 100% !important;
                transform: none !important;
            }
            .name,
            .greeting,
            .role-tagline,
            .bio,
            .skill-tag {
                color: black !important;
                text-shadow: none !important;
                background: transparent !important;
                border-color: #ccc !important;
                box-shadow: none !important;
            }
            .greeting {
                background: #f0f0f0 !important;
                color: #333 !important;
            }
            .role-tagline {
                background: #f0f0f0 !important;
                color: #333 !important;
            }
            .skill-tag {
                background: #eaeaea !important;
                color: #222 !important;
                border: 1px solid #aaa !important;
            }
            .bio {
                background: #f9f9f9 !important;
                color: #111 !important;
                border: 1px solid #ddd !important;
            }
            .avatar {
                border: 2px solid #aaa !important;
                box-shadow: none !important;
                filter: grayscale(0%);
            }
            .card-content {
                width: 100%;
            }
            .avatar:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="card-wrapper">
        <div class="business-card">
            <div class="card-content">
                <!-- 头像：DiceBear 免费稳定服务 -->
                <img class="avatar" 
                     src="https://api.dicebear.com/9.x/avataaars/svg?seed=YangMillion&backgroundColor=b6e3f4&radius=50" 
                     alt="阳百万的个人头像"
                     loading="eager"
                     onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/avataaars/svg?seed=fallback&backgroundColor=ffb6c1';">
                
                <!-- 动态问候语 -->
                <div class="greeting" id="dynamicGreeting">🌙 加载中...</div>
                
                <h1 class="name">阳百万</h1>
                
                <div class="role-tagline">
                    🧑‍🎓 学生 &nbsp;|&nbsp; 💻 编程爱好者 &nbsp;|&nbsp; 🚀 未来开发者
                </div>
                
                <p class="bio">
                    ✨ 我正在学习用AI辅助开发，这是我的第一个名片网页。
                </p>
                
                <div class="skills">
                    <span class="skill-tag">🤝 沟通能力</span>
                    <span class="skill-tag">⚡ 快速学习</span>
                    <span class="skill-tag">🤖 AI工具使用</span>
                </div>
                
                <!-- 按钮组：联系我、复制邮箱、打印名片 -->
                <div class="button-group">
                    <a href="mailto:1528184236@qq.com" class="contact-btn">
                        📧 联系我
                    </a>
                    <button class="contact-btn" id="copyEmailBtn">
                        📋 复制邮箱
                    </button>
                    <button class="contact-btn" id="printCardBtn">
                        🖨️ 打印名片
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 页脚区域：版权信息 + GitHub 社交链接 -->
    <div class="footer">
        <div class="copyright">
            © 2026 阳百万 · 暗夜灵感 | AI 赋能未来
        </div>
        <a href="https://github.com/yangbaiwan1" target="_blank" rel="noopener noreferrer" class="social-link">
            <i class="fab fa-github"></i> GitHub
        </a>
    </div>

    <script>
        (function() {
            // 动态问候语逻辑
            function updateGreeting() {
                const greetingEl = document.getElementById('dynamicGreeting');
                if (!greetingEl) return;
                const now = new Date();
                const hours = now.getHours();
                let message = '';
                
                if (hours >= 6 && hours < 12) {
                    message = '🌅 早上好';
                } else if (hours >= 12 && hours < 14) {
                    message = '☀️ 中午好';
                } else if (hours >= 14 && hours < 18) {
                    message = '📖 下午好';
                } else if (hours >= 18 && hours < 22) {
                    message = '🌙 晚上好';
                } else {
                    message = '💤 夜深了';
                }
                greetingEl.textContent = message;
            }
            updateGreeting();
            
            // 邮箱复制功能
            const EMAIL_ADDRESS = '1528184236@qq.com';
            const copyButton = document.getElementById('copyEmailBtn');
            if (copyButton) {
                copyButton.addEventListener('click', async function(event) {
                    event.preventDefault();
                    try {
                        await navigator.clipboard.writeText(EMAIL_ADDRESS);
                        alert('邮箱已复制');
                    } catch (err) {
                        console.warn('Clipboard API 失败，使用备用复制方法', err);
                        const textarea = document.createElement('textarea');
                        textarea.value = EMAIL_ADDRESS;
                        document.body.appendChild(textarea);
                        textarea.select();
                        try {
                            document.execCommand('copy');
                            alert('邮箱已复制');
                        } catch (fallbackErr) {
                            alert('复制失败，请手动复制邮箱: ' + EMAIL_ADDRESS);
                        }
                        document.body.removeChild(textarea);
                    }
                });
            }
            
            // 打印名片功能
            const printBtn = document.getElementById('printCardBtn');
            if (printBtn) {
                printBtn.addEventListener('click', function() {
                    window.print();
                });
            }
        })();
    </script>
</body>
</html>
