<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>阳百万 · 现代个人名片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 淡绿色渐变背景 — 清新自然质感 */
            background: linear-gradient(145deg, #d2f0da 0%, #b4e0c4 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* 背景细微光点效果，提升现代感 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 245, 215, 0.2) 0%, rgba(180, 224, 196, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* 卡片容器 - 弹性居中 */
        .card-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 2;
        }

        /* 橙色圆角卡片 + 阴影 */
        .business-card {
            max-width: 560px;
            width: 100%;
            background: #FFAD60;
            background: linear-gradient(135deg, #FFB26B, #FF9F4A);
            border-radius: 48px;
            box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.35), 0 8px 18px rgba(0, 0, 0, 0.1);
            padding: 2rem 2rem 2.2rem;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
        }

        /* 悬浮时微微上浮 */
        .business-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 55px -22px rgba(0, 0, 0, 0.4);
        }

        /* 内层内容容器 */
        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* 圆形头像区域 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 245, 0.85);
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease;
            background-color: #fff3e5;
        }

        .avatar:hover {
            transform: scale(1.02);
        }

        /* 姓名 */
        .name {
            font-size: 2.2rem;
            font-weight: 700;
            margin-top: 1.2rem;
            margin-bottom: 0.25rem;
            color: #2E241F;
            letter-spacing: -0.3px;
            text-shadow: 0 1px 1px rgba(255, 245, 210, 0.4);
        }

        /* 职业/标签行 */
        .role-tagline {
            font-size: 0.95rem;
            font-weight: 500;
            background: rgba(46, 36, 31, 0.12);
            backdrop-filter: blur(2px);
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: #2C241E;
            margin-bottom: 1.2rem;
            letter-spacing: 0.3px;
            border: 0.5px solid rgba(255, 235, 205, 0.5);
        }

        /* 个人简介 */
        .bio {
            font-size: 1rem;
            line-height: 1.5;
            background: rgba(255, 250, 240, 0.2);
            padding: 0.9rem 1.2rem;
            border-radius: 28px;
            color: #2b241f;
            margin: 0.8rem 0 1.4rem 0;
            width: 100%;
            font-weight: 500;
            backdrop-filter: blur(2px);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 1px 1px rgba(255,255,210,0.3);
        }

        /* 技能标签组 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin: 0.8rem 0 1.6rem 0;
            width: 100%;
        }

        .skill-tag {
            background: #FFF6EA;
            padding: 0.5rem 1.25rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #B45F2B;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            border: 0.5px solid rgba(255, 200, 130, 0.6);
        }

        .skill-tag:hover {
            background: #fff1e0;
            transform: translateY(-2px);
            color: #8B4513;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.08);
        }

        /* 联系按钮 */
        .contact-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: white;
            color: #E5671A;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.85rem 2rem;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.25s ease;
            margin-top: 0.4rem;
            margin-bottom: 0.6rem;
            width: auto;
            min-width: 180px;
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .contact-btn:hover {
            background: #FFF3E9;
            transform: scale(1.02);
            box-shadow: 0 12px 22px -10px rgba(0, 0, 0, 0.25);
            color: #C84C0A;
            gap: 12px;
        }

        .contact-btn:active {
            transform: scale(0.98);
        }

        /* 底部版权 */
        .copyright {
            text-align: center;
            font-size: 0.8rem;
            color: #3a5a3e;
            background: rgba(225, 245, 215, 0.5);
            backdrop-filter: blur(6px);
            padding: 1rem 1rem;
            width: 100%;
            font-weight: 450;
            letter-spacing: 0.3px;
            border-radius: 60px;
            margin-top: 2rem;
            width: auto;
            max-width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border-top: 1px solid rgba(100, 80, 50, 0.1);
        }

        /* 响应式 */
        @media (max-width: 580px) {
            .business-card {
                padding: 1.5rem 1.4rem 1.8rem;
                border-radius: 36px;
            }
            .avatar {
                width: 100px;
                height: 100px;
            }
            .name {
                font-size: 1.8rem;
                margin-top: 0.9rem;
            }
            .role-tagline {
                font-size: 0.8rem;
                padding: 0.3rem 0.9rem;
            }
            .bio {
                font-size: 0.9rem;
                padding: 0.7rem 1rem;
            }
            .skill-tag {
                font-size: 0.75rem;
                padding: 0.4rem 1rem;
            }
            .contact-btn {
                padding: 0.7rem 1.6rem;
                font-size: 0.9rem;
                min-width: 160px;
            }
            .copyright {
                font-size: 0.7rem;
                padding: 0.7rem 1rem;
                margin-top: 1.2rem;
            }
        }

        @media (max-width: 400px) {
            .business-card {
                padding: 1.2rem 1.2rem 1.6rem;
            }
            .skills {
                gap: 0.6rem;
            }
            .skill-tag {
                font-size: 0.7rem;
                padding: 0.35rem 0.9rem;
            }
        }

        @media (max-height: 680px) and (orientation: landscape) {
            body {
                padding: 0.8rem;
            }
            .business-card {
                padding: 1rem 1.8rem;
            }
            .avatar {
                width: 80px;
                height: 80px;
            }
            .name {
                font-size: 1.6rem;
                margin-top: 0.4rem;
            }
            .bio {
                margin: 0.4rem 0 0.8rem;
            }
            .skills {
                margin: 0.4rem 0 1rem;
            }
        }

        .card-content > * + * {
            margin-top: 0.1rem;
        }

        .business-card {
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.2s;
        }
    </style>
</head>
<body>
    <div class="card-wrapper">
        <div class="business-card">
            <div class="card-content">
                <!-- 圆形头像：使用指定的知乎图片链接，并确保圆形与响应式裁剪 -->
                <img class="avatar" 
                     src="https://pica.zhimg.com/v2-d0142a2d51fa9385231d469af5688a9e_1440w.jpg" 
                     alt="阳百万的个人头像"
                     loading="eager">
                
                <h1 class="name">阳百万</h1>
                
                <div class="role-tagline">
                    🧑‍🎓 学生 &nbsp;|&nbsp; 💻 编程爱好者 &nbsp;|&nbsp; 🚀 未来开发者
                </div>
                
                <p class="bio">
                    ✨ 我正在学习用AI辅助开发，这是我的第一个名片网页。
                </p>
                
                <div class="skills">
                    <span class="skill-tag">🤝 沟通能力</span>
                    <span class="skill-tag">⚡ 快速学习</span>
                    <span class="skill-tag">🤖 AI工具使用</span>
                </div>
                
                <!-- 联系按钮，点击打开邮件客户端，收件人为指定QQ邮箱 -->
                <a href="mailto:1528184236@qq.com" class="contact-btn">
                    📧 联系我
                </a>
            </div>
        </div>
    </div>
    
    <footer class="copyright">
        © 2026 阳百万 · 灵感与AI同行
    </footer>
</body>
</html>
